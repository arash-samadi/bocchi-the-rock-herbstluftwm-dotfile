# Backend - Set to GLX for blur support
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 2;  # Helps with performance
vsync = true;
use-damage = false;

# Remove 'refresh-rate = 144;' entirely, it is no longer supported.

active-opacity = 0.95;
inactive-opacity = 0.85;
frame-opacity = 0.7;
opacity-rule = [
    "100:class_g = 'Firefox'"
];

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 4;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'desktop'",
    "class_g = 'xwinwrap'"
];

# Force transparency/blur for Polybar
opacity-rule = [
    "90:class_g = 'Polybar'"
];

fading = true;
fade-delta = 10;
fade-in-step = 0.05;
fade-out-step = 0.05;
# Corners - YOUR ORIGINAL SETTINGS
corner-radius = 20;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];


animations = true;

animation-stiffness-in-tag = 70;        # Speed for windows opening in current tag
animation-stiffness-tag-change = 70;    # Speed for tag switching (slower = smoother)

# Animation physics - 144Hz optimized
animation-dampening = 12;                # Better frame pacing at 144Hz
animation-clamping = false;               # Prevents micro-stutter at high refresh
animation-window-mass = 1.2;

# Window opening - smooth pop/zoom from center
animation-for-open-window = "zoom";
animation-stiffness-unmap = 70;
# Window closing - squeeze to center
animation-for-unmap-window = "zoom";

# Popup/transient windows - slide down
animation-for-transient-window = "slide-down";

# TAG SWITCHING - The important part!
# Windows leaving current tag
animation-for-prev-tag = "slide-left";   # Slide out to the left
enable-fading-prev-tag = true;

# Windows entering new tag  
animation-for-next-tag = "slide-right";  # Slide in from the right
enable-fading-next-tag = true;

