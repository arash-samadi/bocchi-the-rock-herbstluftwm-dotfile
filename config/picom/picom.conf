backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 2;  
vsync = true;
use-damage = false;
active-opacity = 0.95;
inactive-opacity = 0.85;
frame-opacity = 0.7;
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 4;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'desktop'",
    "class_g = 'xwinwrap'"
];
opacity-rule = [
    "90:class_g = 'Polybar'"
];
fading = true;
fade-delta = 10;
fade-in-step = 0.05;
fade-out-step = 0.05;
corner-radius = 20;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
animations = true;
animation-stiffness-in-tag = 70;    
animation-stiffness-tag-change = 70;   
animation-dampening = 12;                
animation-clamping = false;              
animation-window-mass = 1.2;
animation-for-open-window = "zoom";
animation-stiffness-unmap = 70;
animation-for-unmap-window = "zoom";
animation-for-transient-window = "slide-down";
animation-for-prev-tag = "slide-left";
enable-fading-prev-tag = true; 
animation-for-next-tag = "slide-right"; 
enable-fading-next-tag = true;

