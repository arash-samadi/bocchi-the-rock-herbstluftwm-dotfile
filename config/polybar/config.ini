[colors]
# The '00' at the start of the hex makes the background 100% transparent
bg = #001a1b26
blue = #548096
frost = #A0CADA
fg = #cdd6f4

[bar/main]
width = 100%
height = 40  
offset-x = 0
offset-y = 0
radius = 0   
background = ${colors.bg}
foreground = ${colors.fg}
monitor = eDP1   
enable-ipc = true
fixed-center = true

override-redirect = false
border-size = 0
top = true

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=13;3"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=16.5;4"

modules-left = start
modules-center = date
modules-right = battery-chill

[module/battery-chill]
type = custom/script
exec = echo "󰁹 $(cat /sys/class/power_supply/BAT*/capacity)%"
interval = 30
label = %output%
label-foreground = ${colors.frost}
label-padding = 2

[module/start]
type = custom/text
format = "%{F#A0CADA}%{T2}%{T-}%{F-}"
format-padding = 1.75
click-left = rofi -show drun
cursor-click = pointer

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
label = %date%
